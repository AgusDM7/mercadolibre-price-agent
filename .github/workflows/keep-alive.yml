name: Keep Render alive

# Render duerme los servicios del free tier a los 15 minutos sin tráfico externo.
# Este workflow hace curl al endpoint /health cada 10 minutos desde la
# infraestructura de GitHub para mantener el servicio despierto.
#
# Notas:
# - El cron de GitHub Actions tiene un mínimo de 5 minutos y puede demorarse
#   bajo carga; 10 minutos da margen frente al límite de 15 minutos de Render.
# - workflow_dispatch permite disparar el ping manualmente desde la pestaña
#   Actions para probar.
# - continue-on-error evita que un fallo aislado (Render reiniciando, red caída)
#   marque el workflow como roto.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        continue-on-error: true
        run: |
          curl --fail --show-error \
               --max-time 60 \
               --retry 3 \
               --retry-delay 10 \
               --retry-all-errors \
               https://mercadolibre-price-agent.onrender.com/health
